# Eclipse Mosquitto — MQTT broker (MVP)
# TLS certs: mount ./mosquitto/certs -> /mosquitto/certs

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Plaintext MQTT — port 1883
listener 1883
protocol mqtt
allow_anonymous true

# MQTTS — port 8883 (requires ca.crt, server.crt, server.key)
listener 8883
protocol mqtt
allow_anonymous true
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
